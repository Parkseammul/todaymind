<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘마음</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-container">
    <main class="page">
        <section class="card hero-card">
            <p class="eyebrow">오늘마음</p>

            <h1>
                생각이 많을 때,<br>
                머릿속에서 꺼내<br>
                짧게 정리해보세요.
            </h1>

            <p class="description">
                오늘마음은 생각을 더 파고드는 앱이 아니라,
                지금 떠오른 생각을 꺼내고 정리하고 내려놓는 앱입니다.
            </p>

            <div class="button-group">
                <a class="primary-button" href="/records/new">생각 정리하기</a>
                <a class="secondary-button" href="/records">정리한 생각 보기</a>
            </div>
        </section>

        <section class="card">
            <h2>어떻게 정리하나요?</h2>
            <ol class="guide-list">
                <li>무슨 일이 있었는지 적어요.</li>
                <li>어떤 감정이 들었는지 고르세요.</li>
                <li>머릿속에 떠오른 생각을 적어요.</li>
                <li>실제로 확인된 사실을 나눠봐요.</li>
                <li>지금 할 수 있는 작은 행동을 정해요.</li>
            </ol>
        </section>

        <footer class="footer-links">
            <a href="/pages/privacy">개인정보 안내</a>
            <span>·</span>
            <a href="/pages/about">앱 정보</a>
        </footer>
    </main>
</div>
</body>
</html>
