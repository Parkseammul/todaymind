<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생각 정리하기</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-container">
    <main class="page">
        <header class="page-header">
            <a class="back-link" href="/">←</a>
            <h1>생각 정리하기</h1>
        </header>

        <form id="recordForm" class="card form-card">
            <div class="form-field">
                <label for="recordDate">기록 날짜</label>
                <input type="date" id="recordDate" name="recordDate">
            </div>

            <div class="form-field">
                <label for="situation">1. 무슨 일이 있었나요?</label>
                <textarea id="situation" name="situation" rows="4" placeholder="예: 친구가 카톡을 읽고 답장을 안 했다."></textarea>
                <p class="error-message" id="situationError"></p>
            </div>

            <div class="form-field">
                <label>2. 어떤 감정이 들었나요?</label>
                <div class="emotion-grid">
                    <label><input type="radio" name="emotion" value="불안"> 불안</label>
                    <label><input type="radio" name="emotion" value="서운함"> 서운함</label>
                    <label><input type="radio" name="emotion" value="화남"> 화남</label>
                    <label><input type="radio" name="emotion" value="슬픔"> 슬픔</label>
                    <label><input type="radio" name="emotion" value="피곤함"> 피곤함</label>
                    <label><input type="radio" name="emotion" value="복잡함"> 복잡함</label>
                    <label><input type="radio" name="emotion" value="평온함"> 평온함</label>
                    <label><input type="radio" name="emotion" value="기쁨"> 기쁨</label>
                </div>
                <p class="error-message" id="emotionError"></p>
            </div>

            <div class="form-field">
                <label for="thought">3. 머릿속에 떠오른 생각은 무엇인가요?</label>
                <textarea id="thought" name="thought" rows="4" placeholder="예: 나를 무시하는 것 같다."></textarea>
                <p class="error-message" id="thoughtError"></p>
            </div>

            <div class="form-field">
                <label for="fact">4. 실제로 확인된 사실은 무엇인가요?</label>
                <textarea id="fact" name="fact" rows="4" placeholder="예: 답장이 아직 오지 않았다."></textarea>
            </div>

            <div class="form-field">
                <label for="action">5. 지금 할 수 있는 작은 행동은 무엇인가요?</label>
                <textarea id="action" name="action" rows="4" placeholder="예: 오늘은 더 보내지 않고 내 할 일을 한다."></textarea>
            </div>

            <button class="primary-button" type="submit">정리하고 내려놓기</button>
        </form>
    </main>
</div>

<script src="/js/storage.js"></script>
<script src="/js/record-form.js"></script>
</body>
</html>
