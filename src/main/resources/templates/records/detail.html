<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정리한 생각</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-container">
    <main class="page">
        <header class="page-header">
            <a class="back-link" href="/records">←</a>
            <h1>정리한 생각</h1>
        </header>

        <section id="notFound" class="card empty-state hidden">
            <h2>기록을 찾을 수 없어요.</h2>
            <p class="description">이미 삭제되었거나 잘못된 주소일 수 있어요.</p>
            <a class="primary-button" href="/records">목록으로 돌아가기</a>
        </section>

        <section id="detailCard" class="card detail-card hidden">
            <p class="record-date" id="recordDate"></p>
            <span class="emotion-badge" id="emotion"></span>

            <div class="detail-block">
                <h2>무슨 일이 있었나요?</h2>
                <p id="situation"></p>
            </div>

            <div class="detail-block">
                <h2>머릿속에 떠오른 생각은?</h2>
                <p id="thought"></p>
            </div>

            <div class="detail-block">
                <h2>실제로 확인된 사실은?</h2>
                <p id="fact"></p>
            </div>

            <div class="detail-block">
                <h2>지금 할 수 있는 작은 행동은?</h2>
                <p id="action"></p>
            </div>

            <p class="meta-text" id="createdAt"></p>
            <p class="meta-text" id="modifiedAt"></p>

            <div class="button-group">
                <a id="editLink" class="primary-button" href="#">수정하기</a>
                <button id="deleteButton" class="danger-button" type="button">삭제하기</button>
                <a class="secondary-button" href="/records">목록으로 돌아가기</a>
            </div>
        </section>
    </main>
</div>

<script src="/js/storage.js"></script>
<script src="/js/record-detail.js"></script>
</body>
</html>
