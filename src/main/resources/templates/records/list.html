<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정리한 생각들</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-container">
    <main class="page">
        <header class="page-header">
            <a class="back-link" href="/">←</a>
            <h1>정리한 생각들</h1>
        </header>

        <section id="emptyState" class="card empty-state hidden">
            <h2>아직 정리한 생각이 없어요.</h2>
            <p class="description">
                생각이 많을 때, 짧게 꺼내서 정리해보세요.
            </p>
            <a class="primary-button" href="/records/new">생각 정리하기</a>
        </section>

        <section id="recordList" class="record-list"></section>

        <div class="bottom-actions">
            <a class="primary-button" href="/records/new">생각 정리하기</a>
            <button id="deleteAllButton" class="danger-button" type="button">전체 기록 삭제</button>
        </div>
    </main>
</div>

<script src="/js/storage.js"></script>
<script src="/js/record-list.js"></script>
</body>
</html>
