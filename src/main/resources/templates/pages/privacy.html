<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인정보 안내</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-container">
    <main class="page">
        <header class="page-header">
            <a class="back-link" href="/">←</a>
            <h1>개인정보 안내</h1>
        </header>

        <section class="card">
            <h2>기록은 어디에 저장되나요?</h2>
            <p class="description">
                오늘마음은 회원가입 없이 사용할 수 있습니다.
                작성한 기록은 사용자의 브라우저 localStorage에 저장되며,
                서버로 전송되지 않습니다.
            </p>

            <h2>삭제하면 복구할 수 있나요?</h2>
            <p class="description">
                전체 기록 삭제 또는 브라우저 데이터 삭제 시 기록은 복구할 수 없습니다.
            </p>

            <h2>상담 서비스인가요?</h2>
            <p class="description">
                오늘마음은 상담, 치료, 진단을 제공하지 않습니다.
                머릿속 생각을 짧게 정리하는 개인 기록 도구입니다.
            </p>

            <div class="button-group">
                <a class="secondary-button" href="/">메인으로 돌아가기</a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
